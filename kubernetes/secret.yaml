# xxl-job-exporter — DB 密碼 Secret
# GitOps 注意：此檔案含機密，請勿直接 commit 明文密碼。
# 建議透過 SealedSecret / ExternalSecret / SOPS 加密後再納入版本控制。
#
# 手動建立（不納入 Git）：
#   kubectl create secret generic xxl-job-exporter-db \
#     --namespace monitoring \
#     --from-literal=db-password='your-password'
---
apiVersion: v1
kind: Secret
metadata:
  name: xxl-job-exporter-db
  namespace: monitoring
type: Opaque
stringData:
  # exporter 透過 XXL_JOB_DB_PASSWORD_FILE 讀取，不會出現在環境變數中
  db-password: "CHANGE_ME"
