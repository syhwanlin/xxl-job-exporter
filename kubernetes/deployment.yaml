# xxl-job-exporter — Kubernetes 部署（Deployment + Service + Secret）
# GitOps 友善：Secret 建議改由 SealedSecret / ExternalSecret 管理。
---
apiVersion: v1
kind: Secret
metadata:
  name: xxl-job-exporter-db
  namespace: monitoring
type: Opaque
stringData:
  # exporter 透過 XXL_JOB_DB_PASSWORD_FILE 讀取，不會出現在環境變數中
  db-password: "CHANGE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xxl-job-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: xxl-job-exporter
spec:
  replicas: 1   # 指標來源是同一顆 DB，單副本即可；要 HA 可開 2 副本並設 EXPORTER_CACHE_TTL
  selector:
    matchLabels:
      app.kubernetes.io/name: xxl-job-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: xxl-job-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: your-registry/xxl-job-exporter:1.0.0
          ports:
            - name: metrics
              containerPort: 9588
          env:
            - name: XXL_JOB_DB_HOST
              value: "your-mysql-host"
            - name: XXL_JOB_DB_PORT
              value: "3306"
            - name: XXL_JOB_DB_USER
              value: "xxl_job_exporter"
            - name: XXL_JOB_DB_NAME
              value: "xxl_job"
            - name: XXL_JOB_DB_PASSWORD_FILE
              value: "/etc/xxl-job-exporter/db-password"
            - name: EXPORTER_WINDOWS
              value: "5m,1h,24h"
            - name: EXPORTER_LOOKBACK
              value: "7d"
            - name: EXPORTER_CACHE_TTL
              value: "15"
          volumeMounts:
            - name: db-secret
              mountPath: /etc/xxl-job-exporter
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz       # 會實際連 DB 做 SELECT 1
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 8
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: db-secret
          secret:
            secretName: xxl-job-exporter-db
---
apiVersion: v1
kind: Service
metadata:
  name: xxl-job-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: xxl-job-exporter
  annotations:
    # 若未使用 Prometheus Operator，靠 annotation 自動發現：
    prometheus.io/scrape: "true"
    prometheus.io/port: "9588"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app.kubernetes.io/name: xxl-job-exporter
  ports:
    - name: metrics
      port: 9588
      targetPort: metrics
